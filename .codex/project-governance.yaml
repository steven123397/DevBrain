version: 1
workflow:
  mode: adaptive
  auto_trigger: true
  opt_out_phrases:
    - "直接做"
    - "跳过文档治理"
    - "先别管文档"
paths:
  root_rules:
    - "AGENTS.md"
    - "CLAUDE.md"
  subtree_rules_glob: "**/AGENTS.md"
  index: "docs/index.md"
  background:
    - "docs/codex-kickoff-brief.md"
  design:
    - "docs/design/product-requirements.md"
    - "docs/design/future-data-model.md"
  plan:
    active:
      - "docs/plan/implementation-plan.md"
    templates_dir: "docs/plan"
    archive: "docs/plan/history.md"
  status:
    current: "docs/status/project-status.md"
    review_findings: "docs/status/code-review-status.md"
  readme: "README.md"
templates:
  design: "docs/design/template.md"
  plan: "docs/plan/template.md"
  status: "docs/status/template.md"
task_tiers:
  light:
    plan_required: false
    design_required: false
  standard:
    plan_required: false
    design_required: conditional
  heavy:
    plan_required: true
    design_required: true
bootstrap:
  create_docs_index: true
  create_templates: true
  create_root_agents: false
  create_subtree_agents: conditional
